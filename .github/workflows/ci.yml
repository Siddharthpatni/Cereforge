name: CereForge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-quality:
    name: Backend — Lint, Type Check, Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cereforge_test
          POSTGRES_USER: cereforge
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cereforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: cd backend && ruff check app/
      - name: Ruff format
        run: cd backend && ruff format app/
      - name: Run tests with coverage
        run: cd backend && pytest tests/ -v --cov=app --cov-report=xml
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://cereforge:testpassword@localhost:5432/cereforge_test
          DATABASE_URL: postgresql+asyncpg://cereforge:testpassword@localhost:5432/cereforge_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci-pipeline-only-do-not-reuse
          APP_SECRET_KEY: test-app-secret-key-for-ci-pipeline-only-do-not-reuse

  frontend-quality:
    name: Frontend — Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npm run lint --if-present
      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
      - name: Check bundle size
        run: |
          SIZE=$(du -sk frontend/dist | cut -f1)
          echo "Bundle size: ${SIZE}KB"
          if [ $SIZE -gt 5000 ]; then echo "Bundle too large (>5MB)"; exit 1; fi

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t cereforge-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t cereforge-frontend:ci ./frontend
